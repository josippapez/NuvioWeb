<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{margin:0;height:100%}
#yt{width:100%;height:100%}
</style>
</head>

<body>

<div id="yt"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const params = new URLSearchParams(location.search);
const video = params.get("v") || "qBg39HCJiTU";
const muted = params.get("muted") === "1" ? 1 : 0;

function onYouTubeIframeAPIReady() {
  new YT.Player("yt", {
    videoId: video,
    playerVars: {
      autoplay: 1,
      mute: muted
    }
  });
}
</script>

</body>
</html>
